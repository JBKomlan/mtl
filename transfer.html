<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransferLink - Unique & Sécurisé</title>
    
    <meta property="og:title" content="TransferLink - Unique & Sécurisé">
    <meta property="og:description" content="Réglez votre transfert en un clic vers un compte Mobile Money.">
    <meta property="og:image" content="https://raw.githubusercontent.com/JBKomlan/mtl/main/logomtl.png">
    <meta property="og:type" content="website">

    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 10px; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .logo-img { width: 60px; height: auto; margin-bottom: 5px; }
        .logo-text { font-size: 22px; font-weight: 800; background: linear-gradient(45deg, #0056b3, #d4af37); -webkit-background-clip: text; -webkit-text-fill-color: transparent; display: block; margin-bottom: 15px; }
        .reassurance { font-size: 12px; color: #2d3748; background: #ebf8ff; padding: 12px; border-radius: 10px; margin-bottom: 15px; border: 1px dashed #4299e1; }
        .amount-input { width: 100%; font-size: 26px; font-weight: bold; text-align: center; border: 2px solid #0056b3; border-radius: 12px; padding: 10px; margin: 15px 0; box-sizing: border-box; }
        .amount-input[readonly] { background: #f8f9fa; border-color: #cbd5e0; color: #4a5568; }
        .btn-container { display: flex; align-items: center; gap: 8px; margin-top: 15px; }
        .btn-pay { flex: 1; padding: 16px; border-radius: 12px; color: white; text-decoration: none; font-weight: bold; font-size: 14px; display: flex; align-items: center; justify-content: center; }
        .btn-copy-stylized { 
            display: none; width: 50px; height: 50px; background: #f1f5f9; border: 1px solid #e2e8f0; 
            border-radius: 12px; cursor: pointer; align-items: center; justify-content: center; transition: 0.2s;
        }
        .btn-copy-stylized svg { width: 22px; height: 22px; fill: #64748b; }
        .btn-copy-stylized:active { transform: scale(0.9); background: #e2e8f0; }
        .help-text { font-size: 11px; color: #64748b; margin-top: 15px; line-height: 1.4; background: #f8fafc; padding: 10px; border-radius: 8px; }
        .error { color: #dc3545; background: #fff5f5; padding: 25px; border-radius: 15px; border: 1px solid #feb2b2; }
        .disclaimer { font-size: 9px; color: #a0aec0; margin-top: 25px; text-align: justify; border-top: 1px solid #edf2f7; padding-top: 10px; line-height: 1.3; }

        @keyframes pulse-green {
    0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); }
    70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(37, 211, 102, 0); }
    100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
}
.btn-whatsapp-pulse {
    animation: pulse-green 2s infinite;
}

    </style>
</head>
<body>

<div id="app" class="card">🔐 Chargement sécurisé...</div>

<script>
    const CLE_ATTENDUE = "fd2026!tg";
    const url = new URLSearchParams(window.location.search);
    const params = { mt: url.get('mt'), n1: url.get('n1'), id1: url.get('id1'), n2: url.get('n2'), id2: url.get('id2'), e: url.get('e'), f: url.get('f'), d: url.get('d'), s: url.get('s') };

    function verifier() {
        const chaine = params.n1 + "|" + params.n2 + "|" + params.mt + "|" + params.e + "|" + params.f + "|" + params.d + "|" + CLE_ATTENDUE;
        return params.s === btoa(unescape(encodeURIComponent(chaine))).substring(0, 15);
    }

    function copyToClipboard(btn, code) {
        navigator.clipboard.writeText(code).then(() => {
            const old = btn.innerHTML;
            btn.innerHTML = '<svg viewBox="0 0 24 24" fill="#28a745"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>';
            setTimeout(() => { btn.innerHTML = old; }, 2000);
        });
    }

    function showCopy(id) {
        setTimeout(() => { document.getElementById('cp-' + id).style.display = 'flex'; }, 500);
    }

    const app = document.getElementById('app');

    if (!verifier() || (Date.now() - parseInt(params.d)) > (30 * 24 * 60 * 60 * 1000)) {
        app.innerHTML = `<div class="error"><h3>🚫 Lien invalide ou expiré</h3><p> Ce lien n'est plus certifié ou a dépassé sa période de validité.</p></div>`;
    } else {
        const suffixe = (params.f === "1") ? "2" : "1";
        app.innerHTML = `
            <img src="https://raw.githubusercontent.com/JBKomlan/mtl/main/logomtl.png" alt="Logo" class="logo-img">
            <span class="logo-text">* TransferLink </span>
            <div class="reassurance">ℹ️ Après avoir cliqué, validez simplement l'appel sur votre téléphone.</div>
            <label style="font-size:12px; color:#718096;">Montant à régler (FCFA) :</label>
            <input type="number" id="mtField" class="amount-input" value="${params.mt}" ${params.e === "0" ? 'readonly' : ''}>
            <div id="btns"></div>
            <div class="help-text">💡 En cas de souci avec le bouton de transfert, veuillez utiliser l'icône de copie apparue à droite pour coller le code manuellement dans votre clavier d'appel.</div>
            <div class="disclaimer"><b>Disclaimer :</b> L'initiative TransferLink vise à rapprocher davantage le "Mobile Money" aux Réseaux Sociaux tels que WhatsApp, TikTok et d'autres, à simplifier le processus de transfert d'Argent Mobile à nos utilisateurs et clients en ligne, 
            à réduire les erreurs de transfert tout en créant une preuve de requête de transfert ou paiement alternatif. Toutefois, nous ne sommes responsables d'aucun préjudice éventuel que pourrait entraîner l'utilisation de notre système. Veuillez vérifier montant,
            numéro et identité du destinataire avant toute validation finale.</div>

            <a href="https://wa.me/22898390629?text=Salut%2C%20Je%20viens%20de%20d%C3%A9couvrir%20votre%20solution%20TransferLink.%20J%27aimerais%20en%20savoir%20plus%20pour%20booster%20mon%20business%20en%20ligne." 
   target="_blank" 
   class="btn-whatsapp-pulse"
   style="display: inline-block; background: #25D366; color: white; padding: 10px 18px; border-radius: 50px; text-decoration: none; font-size: 11px; font-weight: bold; transition: 0.3s;">
    🟢 Obtenir mon propre lien TransferLink
</a>

            
            <div style="font-size: 10px; color: #a0aec0; margin-top: 15px; text-align: center;">
             &copy; ${new Date().getFullYear()} <b>TransferLink</b>. Tous droits réservés.</div>

        `;

    const draw = () => {
    // On récupère la valeur saisie (montant actuel)
    const val = parseFloat(document.getElementById('mtField').value) || 0;
    // On récupère le montant minimum autorisé (montant initial du lien)
    const minAutorise = parseFloat(params.mt) || 0;
    
    let h = "";
    const copyIcon = '<svg viewBox="0 0 24 24"><path d="M16 1H4C2.9 1 2 1.9 2 3V17H4V3H16V1ZM19 5H8C6.9 5 6 5.9 6 7V21C6 22.1 6.9 23 8 23H19C20.1 23 21 22.1 21 21V7C21 5.9 20.1 5 19 5ZM19 21H8V7H19V21Z"/></svg>';
    
    // CONDITION : Si le montant est inférieur au minimum, on affiche un message d'erreur au lieu des boutons
    if (val < minAutorise) {
        h = `<div style="color: #dc3545; font-size: 13px; margin-top: 10px; font-weight: bold;">
                ⚠️ Le montant ne peut pas être inférieur à ${minAutorise} FCFA.
             </div>`;
    } else {
        // Génération normale des boutons si le montant est correct ou supérieur
        if(params.n1 && params.n1.length === 8) {
            const c1 = `*145*1*${val}*${params.n1}*${suffixe}#`;
            h += `<div class="btn-container"><a href="tel:${c1.replace('#','%23')}" onclick="showCopy('t')" class="btn-pay" style="background:#007bff; font-size:16px;">🔵 MiXX ==> (${params.n1 || ''}  "${params.id1 || ''}")</a><button id="cp-t" class="btn-copy-stylized" onclick="copyToClipboard(this, '${c1}')">${copyIcon}</button></div>`;
        }
        if(params.n2 && params.n2.length === 8) {
            const c2 = `*155*1*1*${params.n2}*${params.n2}*${val}*${suffixe}#`;
            h += `<div class="btn-container"><a href="tel:${c2.replace('#','%23')}" onclick="showCopy('m')" class="btn-pay" style="background:#ffc107; color:#333; font-size:16px;">🟡 FlOOZ ==> (${params.n2 || ''} "${params.id2 ||''}")</a><button id="cp-m" class="btn-copy-stylized" onclick="copyToClipboard(this, '${c2}')">${copyIcon}</button></div>`;
        }
    }
    document.getElementById('btns').innerHTML = h;
};

        document.getElementById('mtField').addEventListener('input', draw);
        draw();
    }
</script>
</body>
</html>
