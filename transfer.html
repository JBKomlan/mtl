<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transfert Sécurisé Par TransferLink</title></title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        .amount-input { width: 100%; font-size: 28px; font-weight: bold; text-align: center; border: 2px solid #007bff; border-radius: 12px; padding: 10px; margin: 15px 0; box-sizing: border-box; color: #333; }
        .amount-input[readonly] { background: #f8f9fa; border-color: #ccc; color: #666; cursor: not-allowed; }
        .info-num { font-size: 13px; color: #666; margin-bottom: 5px; }
        .btn-container { display: flex; align-items: center; gap: 8px; margin-top: 12px; }
        .btn-pay { flex: 1; padding: 18px; border-radius: 15px; color: white; text-decoration: none; font-weight: bold; display: block; font-size: 15px; }
        .btn-copy { display: none; background: #6c757d; color: white; border: none; padding: 15px; border-radius: 12px; cursor: pointer; font-size: 18px; }
        .error { color: #dc3545; background: #fff5f5; padding: 25px; border-radius: 15px; border: 1px solid #feb2b2; }
        .badge-frais { display: inline-block; background: #ebf8ff; color: #2b6cb0; padding: 4px 10px; border-radius: 20px; font-size: 11px; margin-bottom: 10px; border: 1px solid #bee3f8; }
        .success-copy { background: #28a745 !important; }
    </style>
</head>
<body>

<div id="app" class="card">🔐 Vérification...</div>

<script>
    const CLE_ATTENDUE = "fd2026!tg";
    const url = new URLSearchParams(window.location.search);
    
    const params = {
        mt: url.get('mt') || "0",
        n1: url.get('n1') || "",
        id1: url.get('id1') || "",
        n2: url.get('n2') || "",
        id2: url.get('id2') || "",
        e: url.get('e') || "0",
        f: url.get('f') || "0",
        d: url.get('d') || "0",
        s: url.get('s') || ""
    };

    function verifier() {
        const chaine = params.n1 + "|" + params.n2 + "|" + params.mt + "|" + params.e + "|" + params.f + "|" + params.d + "|" + CLE_ATTENDUE;
        const sigAttendue = btoa(unescape(encodeURIComponent(chaine))).substring(0, 15);
        return params.s === sigAttendue;
    }

    function estExpire() {
        const trenteJours = 30 * 24 * 60 * 60 * 1000;
        return (Date.now() - parseInt(params.d)) > trenteJours;
    }

    function copyUSSD(btn, code) {
        navigator.clipboard.writeText(code).then(() => {
            btn.innerHTML = "✅";
            btn.classList.add('success-copy');
            setTimeout(() => { btn.innerHTML = "📋"; btn.classList.remove('success-copy'); }, 2000);
        });
    }

    function showCopy(id) {
        setTimeout(() => { document.getElementById('cp-' + id).style.display = 'block'; }, 600);
    }

    const app = document.getElementById('app');

    if (!verifier()) {
        app.innerHTML = `<div class="error"><h3>🚫 Lien non certifié</h3><p>Ce lien de paiement a été altéré ou est frauduleux.</p></div>`;
    } else if (estExpire()) {
        app.innerHTML = `<div class="error"><h3>⏰ Lien Expiré</h3><p>Ce lien n'est plus valide. Veuillez demander un nouveau lien à KoMo.</p></div>`;
    } else {
        const suffixe = (params.f === "1") ? "2" : "1";
        const readonly = (params.e === "0") ? "readonly" : "";

        app.innerHTML = `
            <h2 style="margin-bottom:5px;">Transfert KoMo</h2>
            ${params.f === "1" ? '<span class="badge-frais">Frais de 1% inclus</span>' : ''}
            <label style="font-size:12px; color:#888;">Montant à régler (FCFA) :</label>
            <input type="number" id="mtField" class="amount-input" value="${params.mt}" ${readonly}>
            ${params.e === "0" ? '<p style="font-size:11px; color:#aaa; margin-top:-10px;">🔒 Montant certifié non modifiable</p>' : ''}
            <div id="btns" style="margin-top:20px;"></div>
        `;

        const field = document.getElementById('mtField');
        const btns = document.getElementById('btns');

        function dessiner() {
            const val = field.value || 0;
            let h = "";
            
            if(params.n1 && params.n1.length === 8) {
                const code1 = `*145*1*${val}*${params.n1}*${suffixe}#`;
                h += `<div style="margin-bottom:20px;">
                        <div class="info-num">Vers T-Money: <b>${params.id1 || params.n1}</b></div>
                        <div class="btn-container">
                            <a href="tel:${code1.replace('#', '%23')}" onclick="showCopy('t')" class="btn-pay" style="background:#007bff">🔵 T-Money</a>
                            <button id="cp-t" class="btn-copy" onclick="copyUSSD(this, '${code1}')">📋</button>
                        </div>
                      </div>`;
            }

            if(params.n2 && params.n2.length === 8) {
                const code2 = `*155*1*1*${params.n2}*${params.n2}*${val}*${suffixe}#`;
                h += `<div>
                        <div class="info-num">Vers Moov: <b>${params.id2 || params.n2}</b></div>
                        <div class="btn-container">
                            <a href="tel:${code2.replace('#', '%23')}" onclick="showCopy('m')" class="btn-pay" style="background:#ffc107; color:#333">🟡 Flooz (Moov)</a>
                            <button id="cp-m" class="btn-copy" onclick="copyUSSD(this, '${code2}')">📋</button>
                        </div>
                      </div>`;
            }
            btns.innerHTML = h || "<p>Aucun mode de réception disponible.</p>";
        }

        field.addEventListener('input', dessiner);
        dessiner();
    }
</script>
</body>
</html>
